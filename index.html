<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON SHIFT - 神ゲー</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000; /* フォールバック */
            font-family: 'Courier New', Courier, monospace; /* 少しレトロなフォント */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
            transition: background 0.5s ease; /* 背景色の変化を滑らかに */
        }
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }
        #ui {
            position: absolute;
            text-align: center;
            pointer-events: none;
            width: 100%;
        }
        .msg {
            font-size: 22px;
            text-shadow: 0 0 10px white;
            letter-spacing: 2px;
            white-space: pre-wrap; /* 改行を有効に */
        }
        #score-container {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: left;
        }
        #score {
            font-size: 60px;
            font-weight: 900;
            line-height: 1;
        }
        #level {
            font-size: 16px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-container">
            <div id="level">PHASE 1</div>
            <div id="score">0</div>
        </div>
        <div id="msg" class="msg">>> CLICK TO START <<</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const levelDisplay = document.getElementById("level");
        const msg = document.getElementById("msg");

        // スマホ向けにサイズを少し調整
        const isMobile = window.innerWidth < 500;
        canvas.width = isMobile ? window.innerWidth * 0.9 : 400;
        canvas.height = isMobile ? window.innerHeight * 0.8 : 600;

        let gameActive = false;
        let score = 0;
        let frameCount = 0;
        let gameSpeed = 3.8;

        // --- カラーテーマ (10点ごとに変化) ---
        // bgTop: 背景グラデーション上, bgBottom: 下, primary: プレイヤー/効果, secondary: 障害物
        const themes = [
            { bgTop: "#050505", bgBottom: "#101015", primary: "#0ff", secondary: "#f0f" }, // Phase 1: Cyan / Magenta
            { bgTop: "#051005", bgBottom: "#102010", primary: "#0f0", secondary: "#ff0" }, // Phase 2: Green / Yellow
            { bgTop: "#100500", bgBottom: "#201010", primary: "#f00", secondary: "#0ff" }, // Phase 3: Red / Cyan
            { bgTop: "#050010", bgBottom: "#101020", primary: "#f0f", secondary: "#0f0" }, // Phase 4: Magenta / Green
            { bgTop: "#101000", bgBottom: "#202010", primary: "#ff0", secondary: "#f0f" }, // Phase 5: Yellow / Magenta
            { bgTop: "#001010", bgBottom: "#102020", primary: "#fff", secondary: "#333" }  // Phase 6+: White / Dark
        ];
        let currentThemeIndex = 0;

        function getTheme() {
            return themes[Math.min(currentThemeIndex, themes.length - 1)];
        }

        // --- プレイヤー ---
        let player = {
            x: canvas.width * 0.15, 
            y: canvas.height / 2, 
            w: 22, h: 22,
            gravity: 0.48, velocity: 0, jump: -8.0
        };

        let obstacles = [];
        let particles = [];

        // --- パーティクルクラス ---
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4 + 1;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.color = color;
                this.life = 1.0;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.025; }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
        }

        // --- ゲームロジック ---
        function flap(e) {
            // スマホでのスクロール等の防止
            if(e.type === 'touchstart') e.preventDefault();

            if (!gameActive) {
                resetGame();
                gameActive = true;
                msg.innerText = "";
            }
            player.velocity = player.jump;
            // ジャンプ時はSecondaryカラーのパーティクル
            createExplosion(player.x, player.y + player.h, getTheme().secondary, 2);
        }

        // イベントリスナー（PC/スマホ両対応）
        window.addEventListener("mousedown", flap);
        window.addEventListener("touchstart", flap, {passive: false});

        function resetGame() {
            player.y = canvas.height / 2;
            player.velocity = 0;
            obstacles = [];
            particles = [];
            score = 0;
            frameCount = 0;
            gameSpeed = 3.8;
            currentThemeIndex = 0;
            updateUIScores();
            applyTheme();
        }

        // スコアに基づきテーマと速度を更新
        function checkProgress() {
            const nextThemeIndex = Math.floor(score / 10);
            if (nextThemeIndex !== currentThemeIndex) {
                currentThemeIndex = nextThemeIndex;
                applyTheme();
                // Phaseアップ時の演出
                createExplosion(canvas.width / 2, canvas.height / 2, "#fff", 30);
                msg.innerText = "PHASE " + (currentThemeIndex + 1);
                setTimeout(() => { if(gameActive) msg.innerText = ""; }, 1000);
            }
            // 速度アップ
            gameSpeed = 3.8 + (score * 0.08); 
        }

        // UIと背景色の更新
        function applyTheme() {
            const theme = getTheme();
            levelDisplay.innerText = "PHASE " + (currentThemeIndex + 1);
            levelDisplay.style.color = theme.primary;
            scoreDisplay.style.color = theme.primary;
            // プレイヤーとUIの影
            scoreDisplay.style.textShadow = `0 0 15px ${theme.primary}`;
            // <body>の背景色を変更（CSSのtransitionで滑らかに）
            document.body.style.background = theme.bgBottom;
        }

        function updateUIScores() {
            scoreDisplay.innerText = score;
        }

        function spawnObstacle() {
            const gap = Math.max(120, 160 - score); // 10点ごとに狭く
            const minH = 60;
            const h = Math.floor(Math.random() * (canvas.height - gap - minH * 2)) + minH;
            obstacles.push({
                x: canvas.width, top: h,
                bottom: canvas.height - h - gap,
                width: 55, passed: false
            });
        }

        function update() {
            particles.forEach((p, i) => { p.update(); if(p.life <= 0) particles.splice(i, 1); });

            if (!gameActive) return;

            // スコアとテーマのチェック
            checkProgress();
            
            player.velocity += player.gravity;
            player.y += player.velocity;

            if (player.y + player.h > canvas.height || player.y < 0) {
                gameOver();
            }

            const spawnRate = Math.max(45, 80 - Math.floor(score / 1.5));
            if (frameCount % spawnRate === 0) spawnObstacle();

            const theme = getTheme();

            obstacles.forEach((ob, i) => {
                ob.x -= gameSpeed;

                // 当たり判定
                if (player.x < ob.x + ob.width && player.x + player.w > ob.x &&
                    (player.y < ob.top || player.y + player.h > canvas.height - ob.bottom)) {
                    gameOver();
                }

                if (!ob.passed && player.x > ob.x + ob.width) {
                    score++;
                    ob.passed = true;
                    updateUIScores();
                    // 通過時はPrimaryカラーの派手な演出
                    createExplosion(player.x + player.w, player.y + player.h / 2, theme.primary, 8);
                }

                if (ob.x + ob.width < 0) obstacles.splice(i, 1);
            });

            frameCount++;
        }

        function draw() {
            const theme = getTheme();

            // 背景グラデーションの描画
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, theme.bgTop);
            gradient.addColorStop(1, theme.bgBottom);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowBlur = 15; // ネオン効果

            // 障害物の描画 (Secondary Color)
            ctx.fillStyle = theme.secondary;
            ctx.shadowColor = theme.secondary;
            obstacles.forEach(ob => {
                ctx.fillRect(ob.x, 0, ob.width, ob.top); // 上
                ctx.fillRect(ob.x, canvas.height - ob.bottom, ob.width, ob.bottom); // 下
            });

            // プレイヤーの描画 (Primary Color)
            ctx.fillStyle = theme.primary;
            ctx.shadowColor = theme.primary;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // パーティクルの描画
            particles.forEach(p => p.draw());

            ctx.shadowBlur = 0; // リセット
        }

        function gameOver() {
            if (!gameActive) return; // 重複防止
            gameActive = false;
            const theme = getTheme();
            // ミス時は Primary と Secondary の混合爆発
            createExplosion(player.x, player.y, theme.primary, 20);
            createExplosion(player.x, player.y, theme.secondary, 20);
            msg.innerText = `GAME OVER\nPHASE: ${currentThemeIndex+1}\nSCORE: ${score}\n>> RESTART <<`;
            // スコアを少し赤くする
            scoreDisplay.style.color = "#ff4444";
            scoreDisplay.style.textShadow = `0 0 15px #ff0000`;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 初期化
        resetGame();
        loop();
    </script>
</body>
</html>
